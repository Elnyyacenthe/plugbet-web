<!DOCTYPE html>
<html>
<head>
  <base href="/app/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Plugbet - Chat & Bet, scores en direct et jeux.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Plugbet">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Plugbet</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #040810; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #loading-overlay {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, #0E1A2E 0%, #040810 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }
    #loading-overlay.done { opacity: 0; pointer-events: none; }
    .logo-text {
      font-size: 42px; font-weight: 900; letter-spacing: -1px;
      background: linear-gradient(135deg, #00E676, #F0F2F5);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .logo-sub {
      font-size: 12px; color: #4A5568; letter-spacing: 2px;
      text-transform: uppercase; margin-bottom: 48px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(0, 230, 118, 0.15);
      border-top-color: #00E676; border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: #8E99A4; font-size: 13px; margin-top: 24px; font-weight: 500; }
    .progress-bar {
      margin-top: 20px; width: 200px; height: 3px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 2px; overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00E676, #FFD600);
      width: 30%; animation: progress 2s ease-in-out infinite;
    }
    @keyframes progress {
      0%   { margin-left: -30%; }
      100% { margin-left: 100%; }
    }
  </style>
</head>
<body>
  <!-- Ecran de chargement affiche tant que Flutter n'a pas demarre -->
  <div id="loading-overlay">
    <div class="logo-text">Plugbet</div>
    <div class="logo-sub">Chat &amp; Bet</div>
    <div class="spinner"></div>
    <div class="loading-text">Chargement de l'application...</div>
    <div class="progress-bar"><div class="progress-fill"></div></div>
  </div>

  <script>
    // ============================================================
    // FORCE CLEAR CACHE — actif jusqu'au 2026-05-21 (1 semaine)
    // ============================================================
    // S'execute UNE seule fois par navigateur. Apres la date limite,
    // le bloc se desactive automatiquement (touche zero perf).
    (function() {
      var FORCE_CLEAR_UNTIL = '2026-05-21';
      var DEPLOY_VERSION = '2026-05-14';
      var today = new Date().toISOString().slice(0, 10);
      if (today >= FORCE_CLEAR_UNTIL) return;
      try {
        var flagKey = 'plugbet_force_clear';
        if (localStorage.getItem(flagKey) === DEPLOY_VERSION) return;
        localStorage.setItem(flagKey, DEPLOY_VERSION);
        console.log('[Plugbet] Force-clear cache once for deploy', DEPLOY_VERSION);
        (async function() {
          try {
            if ('serviceWorker' in navigator) {
              var regs = await navigator.serviceWorker.getRegistrations();
              await Promise.all(regs.map(function(r) { return r.unregister(); }));
            }
            if ('caches' in window) {
              var keys = await caches.keys();
              await Promise.all(keys.map(function(k) { return caches.delete(k); }));
            }
          } catch (e) {
            console.warn('[Plugbet] Force-clear partial failure:', e);
          } finally {
            window.location.reload();
          }
        })();
      } catch (e) {
        console.warn('[Plugbet] Force-clear init failed:', e);
      }
    })();
  </script>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Supprime l'overlay une fois que Flutter a dessine sa premiere frame.
    window.addEventListener('flutter-first-frame', () => {
      const overlay = document.getElementById('loading-overlay');
      if (overlay) {
        overlay.classList.add('done');
        setTimeout(() => overlay.remove(), 500);
      }
    });

    // ============================================================
    // Auto-update : force le service worker a appliquer les nouvelles
    // versions immediatement (au lieu d'attendre la fermeture des onglets).
    // ============================================================
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!window.__plugbet_reloading) {
          window.__plugbet_reloading = true;
          console.log('[Plugbet] Nouvelle version detectee, rechargement...');
          window.location.reload();
        }
      });

      navigator.serviceWorker.ready.then(reg => {
        reg.update().catch(() => {});
        if (reg.waiting) {
          reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        }
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          if (!newWorker) return;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              newWorker.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        });
      });

      // Re-check periodique toutes les 60s
      setInterval(() => {
        if (document.visibilityState === 'visible') {
          navigator.serviceWorker.getRegistration().then(reg => {
            if (reg) reg.update().catch(() => {});
          });
        }
      }, 60000);
    }
  </script>
</body>
</html>
