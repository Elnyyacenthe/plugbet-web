name: nkoulou_live_score
description: "Plugbet – Chat & Bet, scores en direct et jeux."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # --- Réseau & API ---
  http: ^1.2.1
  web_socket_channel: ^3.0.1

  # --- State Management ---
  provider: ^6.1.2

  # --- Internationalisation & Dates ---
  intl: ^0.19.0

  # --- Stockage local (cache offline + favoris) ---
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # --- Supabase (Auth + Realtime + DB) ---
  supabase_flutter: ^2.6.0

  # --- UI / Animations ---
  flutter_spinkit: ^5.2.1
  animate_do: ^3.3.4
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # --- Icônes & Images ---
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1

  # --- Ludo Game Engine ---
  flame: ^1.22.0
  flame_audio: ^2.10.0
  vibration: ^2.0.0
  share_plus: ^12.0.1
  url_launcher: ^6.3.2
  image_picker: ^1.2.1
  flutter_local_notifications: ^20.1.0
  permission_handler: ^12.0.1
  record: ^6.2.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.12
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#555555"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/audio/
    - assets/images/dice/
