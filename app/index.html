<!DOCTYPE html>
<html>
<head>
  <base href="/app/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Plugbet - Chat & Bet, scores en direct et jeux.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Plugbet">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Plugbet</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #040810; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #loading-overlay {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, #0E1A2E 0%, #040810 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }
    #loading-overlay.done { opacity: 0; pointer-events: none; }
    .logo-text {
      font-size: 42px; font-weight: 900; letter-spacing: -1px;
      background: linear-gradient(135deg, #00E676, #F0F2F5);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .logo-sub {
      font-size: 12px; color: #4A5568; letter-spacing: 2px;
      text-transform: uppercase; margin-bottom: 48px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(0, 230, 118, 0.15);
      border-top-color: #00E676; border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: #8E99A4; font-size: 13px; margin-top: 24px; font-weight: 500; }
    .progress-bar {
      margin-top: 20px; width: 200px; height: 3px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 2px; overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00E676, #FFD600);
      width: 30%; animation: progress 2s ease-in-out infinite;
    }
    @keyframes progress {
      0%   { margin-left: -30%; }
      100% { margin-left: 100%; }
    }
  </style>
</head>
<body>
  <!-- Ecran de chargement affiche tant que Flutter n'a pas demarre -->
  <div id="loading-overlay">
    <div class="logo-text">Plugbet</div>
    <div class="logo-sub">Chat &amp; Bet</div>
    <div class="spinner"></div>
    <div class="loading-text">Chargement de l'application...</div>
    <div class="progress-bar"><div class="progress-fill"></div></div>
  </div>

  <script>
    // ============================================================
    // KILL-SWITCH SERVICE WORKER — PERMANENT, SANS DEADLINE
    // ============================================================
    // D'anciennes versions ont deploye un vrai flutter_service_worker.js
    // (PWA cache-first). Ces SW restent installes chez les visiteurs
    // recurrents et continuent de servir l'app en cache, court-circuitant
    // le Cache-Control: no-store cote serveur. Ce build n'a PLUS de SW
    // (--pwa-strategy=none) : il faut donc EVINCER activement tout SW
    // residuel, sinon ces clients sont figes a vie sur l'ancienne version.
    //
    // Anti-boucle (le bug de la version precedente venait d'une DEADLINE
    // codee qui desactivait l'echappatoire le 2026-05-21) :
    //   - Si la page est CONTROLEE par un SW et pas deja nettoyee dans
    //     cette session : unregister tous les SW + purge CacheStorage,
    //     puis UN seul reload (garde sessionStorage).
    //   - Sinon : purge en arriere-plan sans reload. Une fois les clients
    //     evinces, plus aucun SW n'est installe (build sans SW) -> ce
    //     bloc devient un no-op invisible et permanent. Aucune date limite.
    (function () {
      if (!('serviceWorker' in navigator)) return;
      try {
        var hadController = !!navigator.serviceWorker.controller;
        var alreadyCleared = sessionStorage.getItem('pb_sw_killed') === '1';

        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (r) { r.unregister().catch(function () {}); });
        }).catch(function () {});
        if ('caches' in window) {
          caches.keys().then(function (keys) {
            keys.forEach(function (k) { caches.delete(k).catch(function () {}); });
          }).catch(function () {});
        }

        if (hadController && !alreadyCleared) {
          sessionStorage.setItem('pb_sw_killed', '1');
          setTimeout(function () { window.location.reload(); }, 300);
        }
      } catch (e) {
        console.warn('[Plugbet] SW kill-switch:', e);
      }
    })();
  </script>

  <!-- Build --pwa-strategy=none : aucun SW genere. Fraicheur assuree par
       Cache-Control: no-store (nginx) + kill-switch ci-dessus pour evincer
       les SW historiques. -->
  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Supprime l'overlay une fois que Flutter a dessine sa premiere frame.
    window.addEventListener('flutter-first-frame', () => {
      const overlay = document.getElementById('loading-overlay');
      if (overlay) {
        overlay.classList.add('done');
        setTimeout(() => overlay.remove(), 500);
      }
    });

    // [Audit A4] Bloc service-worker retiré : plus de SW (build
    // --pwa-strategy=none) -> plus de controllerchange->reload en
    // pleine partie Ludo, plus de gel post-deadline. Fraîcheur =
    // Cache-Control: no-store (vercel.json).
  </script>
</body>
</html>
